<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMU 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      color: #eee; background: rgba(0,0,0,0.55); padding: 10px 14px;
      border-radius: 8px; font-size: 14px; line-height: 1.5;
    }
    #hud button {
      margin-top: 8px; padding: 6px 14px; cursor: pointer;
      border: none; border-radius: 6px; background: #4a9eff; color: #fff;
      font-size: 14px;
    }
    #hud button:hover { background: #3a8eef; }
    #ipRow { margin-top: 8px; display: flex; gap: 6px; align-items: center; }
    #ipRow input {
      width: 130px; padding: 4px 8px; border-radius: 4px; border: none;
      font-size: 13px;
    }
    .ok { color: #6f6; }
    .err { color: #f66; }
    #activity {
      margin-top: 6px; padding: 6px 10px; border-radius: 6px;
      font-weight: 600; letter-spacing: 0.02em;
    }
    #activity.still { background: rgba(255,255,255,0.08); color: #bbb; }
    #activity.walking { background: rgba(80,200,120,0.25); color: #8f8; }
    #vitals {
      position: fixed; top: 12px; right: 12px; z-index: 10;
      color: #eee; background: rgba(0,0,0,0.55); padding: 12px 16px;
      border-radius: 8px; font-size: 14px; line-height: 1.6; min-width: 148px;
    }
    #vitals h3 {
      margin: 0 0 8px; font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; color: #aaa;
    }
    #vitals .row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px;
    }
    #vitals .label { color: #bbb; }
    #vitals .value { font-weight: 600; font-variant-numeric: tabular-nums; }
    #vitals .value.missing { color: #888; font-weight: 400; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="status">Connecting…</div>
    <div id="fps">FPS: —</div>
    <div id="activity" class="still">Still</div>
    <div id="ipRow" hidden>
      <input id="espIp" type="text" placeholder="192.168.0.195" />
      <button id="connectBtn" type="button">Connect</button>
    </div>
    <button id="resetBtn" type="button">Reset orientation</button>
  </div>
  <div id="vitals">
    <h3>Vitals</h3>
    <div class="row"><span class="label">Temp</span><span class="value missing" id="vTemp">--</span></div>
    <div class="row"><span class="label">Heart rate</span><span class="value missing" id="vHr">--</span></div>
    <div class="row"><span class="label">SpO2</span><span class="value missing" id="vSpo2">--</span></div>
    <div class="row"><span class="label">Air (MQ135)</span><span class="value missing" id="vGas">--</span></div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const statusEl = document.getElementById('status');
    const fpsEl = document.getElementById('fps');
    const activityEl = document.getElementById('activity');
    const resetBtn = document.getElementById('resetBtn');
    const ipRow = document.getElementById('ipRow');
    const espIpInput = document.getElementById('espIp');
    const connectBtn = document.getElementById('connectBtn');
    const vTempEl = document.getElementById('vTemp');
    const vHrEl = document.getElementById('vHr');
    const vSpo2El = document.getElementById('vSpo2');
    const vGasEl = document.getElementById('vGas');
    const servedFromEsp = location.protocol === 'http:' || location.protocol === 'https:';

    /* Poly Pizza hardhat: https://poly.pizza/m/cyjbHPC6QAM (CC Attribution, Poly by Google) */
    const HELMET_GLB_LOCAL = 'models/helmet.glb';
    const HELMET_GLB_CDN =
      'https://static.poly.pizza/535cb2d4-eb2a-441d-899b-d0a5ebd3e37d.glb';
    const HELMET_GLB = servedFromEsp ? HELMET_GLB_CDN : HELMET_GLB_LOCAL;
    const HELMET_ROT_X = 0;
    const HELMET_ROT_Y = 0;
    const HELMET_ROT_Z = 0;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(2.5, 2, 2.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const dir = new THREE.DirectionalLight(0xffffff, 1.1);
    dir.position.set(3, 5, 2);
    scene.add(dir);
    const fill = new THREE.DirectionalLight(0xaaccff, 0.35);
    fill.position.set(-2, 1, -3);
    scene.add(fill);

    const avatar = new THREE.Group();
    scene.add(avatar);

    const helmetPivot = new THREE.Group();
    avatar.add(helmetPivot);
    avatar.add(new THREE.AxesHelper(1.2));

    const displayQuat = new THREE.Quaternion();
    const STILL_QUAT_EPS = 0.0008;
    const STEP_DISTANCE = 0.5;
    const GYRO_DEADBAND_DPS = 2.0;
    const stepDir = new THREE.Vector3();

    let helmetScene = null;
    const helmetTint = { still: 0xf5f5f5, walk: 0xd8f5dc };

    function buildSafetyHelmet() {
      const helmet = new THREE.Group();
      const shell = new THREE.MeshStandardMaterial({
        color: helmetTint.still,
        roughness: 0.42,
        metalness: 0.06,
      });

      const profile = [
        new THREE.Vector2(0.0, 0.52),
        new THREE.Vector2(0.22, 0.5),
        new THREE.Vector2(0.34, 0.38),
        new THREE.Vector2(0.38, 0.22),
        new THREE.Vector2(0.4, 0.1),
        new THREE.Vector2(0.62, 0.05),
        new THREE.Vector2(0.72, 0.02),
        new THREE.Vector2(0.74, 0.0),
      ];
      const body = new THREE.Mesh(
        new THREE.LatheGeometry(profile, 40),
        shell
      );
      body.position.y = -0.02;
      helmet.add(body);

      const brim = new THREE.Mesh(
        new THREE.TorusGeometry(0.7, 0.045, 12, 40),
        shell
      );
      brim.rotation.x = Math.PI / 2;
      brim.position.y = 0.02;
      helmet.add(brim);

      const peak = new THREE.Mesh(
        new THREE.BoxGeometry(0.06, 0.04, 0.22),
        shell
      );
      peak.position.set(0, 0.34, 0.38);
      helmet.add(peak);

      const button = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, 0.03, 12),
        shell
      );
      button.position.set(0, 0.5, 0);
      helmet.add(button);

      helmet.scale.setScalar(1.2);
      return helmet;
    }

    function normalizeHelmetModel(root) {
      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 0.001);
      const scale = 1.1 / maxDim;
      root.position.sub(center);
      root.position.multiplyScalar(scale);
      root.scale.setScalar(scale);
      root.rotation.set(HELMET_ROT_X, HELMET_ROT_Y, HELMET_ROT_Z);
      root.traverse((obj) => {
        if (!obj.isMesh || !obj.material) return;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const mat of mats) {
          if (mat.color) mat.color.setHex(helmetTint.still);
          if (mat.metalness !== undefined) mat.metalness = Math.min(mat.metalness, 0.15);
        }
      });
    }

    function loadHelmetGlb(url) {
      return new Promise((resolve, reject) => {
        new GLTFLoader().load(
          url,
          (gltf) => {
            normalizeHelmetModel(gltf.scene);
            resolve(gltf.scene);
          },
          undefined,
          reject
        );
      });
    }

    function setHelmetTint(hex) {
      if (!helmetScene) return;
      helmetScene.traverse((obj) => {
        if (!obj.isMesh || !obj.material) return;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const mat of mats) {
          if (mat.color) mat.color.setHex(hex);
        }
      });
    }

    function applyOrientation(q, lockStill) {
      const incoming = new THREE.Quaternion(q.x, q.y, q.z, q.w);
      if (lockStill) {
        return;
      }
      if (displayQuat.dot(incoming) < 0) {
        incoming.x = -incoming.x;
        incoming.y = -incoming.y;
        incoming.z = -incoming.z;
        incoming.w = -incoming.w;
      }
      const dot = Math.abs(displayQuat.dot(incoming));
      if (dot > 1 - STILL_QUAT_EPS) {
        return;
      }
      displayQuat.copy(incoming);
      helmetPivot.quaternion.copy(displayQuat);
    }

    async function initHelmet() {
      const urls = [HELMET_GLB, HELMET_GLB_CDN, HELMET_GLB_LOCAL].filter(
        (u, i, a) => u && a.indexOf(u) === i
      );
      for (const url of urls) {
        try {
          helmetScene = await loadHelmetGlb(url);
          helmetPivot.add(helmetScene);
          return;
        } catch (e) {
          console.warn('helmet load failed:', url, e);
        }
      }
      helmetScene = buildSafetyHelmet();
      helmetPivot.add(helmetScene);
    }
    initHelmet();

    let ws;
    let frameCount = 0;
    let lastFpsTime = performance.now();
    let lastQuat = { w: 1, x: 0, y: 0, z: 0 };
    let lastQuatChange = 0;
    let lastMsgTime = 0;
    let lastHeadingTs = 0;
    let lastWalking = false;
    let lastWalkingTime = 0;
    let heading = 0;
    let lastSteps = 0;

    function quatYawRad() {
      const e = new THREE.Euler(0, 0, 0, 'YXZ');
      e.setFromQuaternion(helmetPivot.quaternion);
      return e.y;
    }

    function resetAvatarPose() {
      avatar.position.set(0, 0, 0);
      heading = 0;
      lastSteps = 0;
      lastHeadingTs = 0;
      displayQuat.set(0, 0, 0, 1);
      helmetPivot.quaternion.set(0, 0, 0, 1);
    }

    function updateHeading(gzDps, nowMs, snapFromQuat) {
      if (snapFromQuat) {
        heading = quatYawRad();
        lastHeadingTs = nowMs;
        return;
      }
      if (lastHeadingTs > 0) {
        const dt = Math.min((nowMs - lastHeadingTs) / 1000, 0.08);
        const gz = Math.abs(gzDps) < GYRO_DEADBAND_DPS ? 0 : gzDps;
        heading += (gz * Math.PI / 180) * dt;
      }
      lastHeadingTs = nowMs;
    }

    function advanceWalk(stepsDelta) {
      if (stepsDelta <= 0) return;
      stepDir.set(Math.sin(heading), 0, -Math.cos(heading));
      avatar.position.addScaledVector(stepDir, STEP_DISTANCE * stepsDelta);
    }

    function setStatus(text, ok) {
      statusEl.textContent = text;
      statusEl.className = ok ? 'ok' : 'err';
    }

    function setVital(el, text, ok) {
      el.textContent = text;
      el.classList.toggle('missing', !ok);
    }

    function updateVitals(q) {
      if (typeof q.temp === 'number' && !Number.isNaN(q.temp)) {
        setVital(vTempEl, `${q.temp.toFixed(1)} °C`, true);
      } else {
        setVital(vTempEl, '--', false);
      }
      if (typeof q.hr === 'number' && q.hr > 0) {
        setVital(vHrEl, `${q.hr} bpm`, true);
      } else {
        setVital(vHrEl, '--', false);
      }
      if (typeof q.spo2 === 'number' && q.spo2 > 0) {
        setVital(vSpo2El, `${q.spo2}%`, true);
      } else {
        setVital(vSpo2El, '--', false);
      }
      if (typeof q.mq135 === 'number' && q.mq135 >= 0) {
        setVital(vGasEl, `${q.mq135}`, true);
      } else {
        setVital(vGasEl, '--', false);
      }
    }

    function setActivity(walking, steps) {
      if (walking) {
        activityEl.textContent = `Walking · ${steps} steps`;
        activityEl.className = 'walking';
        setHelmetTint(helmetTint.walk);
      } else {
        activityEl.textContent = steps > 0 ? `Still · ${steps} steps` : 'Still';
        activityEl.className = 'still';
        setHelmetTint(helmetTint.still);
      }
    }

    function quatChanged(q) {
      const e = 0.0005;
      return Math.abs(q.w - lastQuat.w) > e || Math.abs(q.x - lastQuat.x) > e ||
             Math.abs(q.y - lastQuat.y) > e || Math.abs(q.z - lastQuat.z) > e;
    }

    function wsUrl() {
      const q = new URLSearchParams(location.search).get('ip');
      if (q) {
        return `ws://${q}/ws`;
      }
      if (servedFromEsp && location.host) {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${proto}//${location.host}/ws`;
      }
      const ip = (espIpInput.value || localStorage.getItem('espIp') || '').trim();
      if (!ip) {
        return null;
      }
      localStorage.setItem('espIp', ip);
      return `ws://${ip}/ws`;
    }

    function connect() {
      if (ws) {
        ws.onclose = null;
        ws.close();
        ws = null;
      }

      const url = wsUrl();
      if (!url) {
        setStatus('Enter ESP32 IP below (from serial monitor)', false);
        return;
      }

      if (!servedFromEsp) {
        setStatus(`Connecting to ${url}…`, true);
      }

      ws = new WebSocket(url);

      ws.onopen = () => {
        lastMsgTime = 0;
        lastQuatChange = 0;
        lastWalking = false;
        lastWalkingTime = 0;
        resetAvatarPose();
        setActivity(false, 0);
        updateVitals({});
        setStatus('Connected — waiting for data…', true);
        ws.send('hello');
      };
      ws.onclose = () => {
        setStatus('Disconnected — retrying…', false);
        setTimeout(connect, 2000);
      };
      ws.onerror = () => setStatus(`WebSocket failed (${url})`, false);
      ws.onmessage = (ev) => {
        try {
          const q = JSON.parse(ev.data);
          const now = performance.now();
          const walking = !!q.walking;
          const imuStill = q.still === true;
          const steps = q.steps || 0;
          const gz = typeof q.gz === 'number' ? q.gz : 0;

          applyOrientation(q, imuStill && !walking);
          setActivity(walking, steps);
          updateVitals(q);
          const quatSnap = quatChanged(q);
          updateHeading(gz, now, quatSnap);
          if (quatSnap) {
            lastQuat = q;
            lastQuatChange = now;
          }
          if (steps < lastSteps) {
            resetAvatarPose();
          }
          if (steps > lastSteps) {
            if (walking) {
              advanceWalk(steps - lastSteps);
            }
            lastSteps = steps;
          }
          frameCount++;
          lastMsgTime = now;
          if (walking !== lastWalking) {
            lastWalking = walking;
            lastWalkingTime = now;
          }
          if (walking) {
            setStatus('Live IMU data', true);
          } else if (lastQuatChange > 0) {
            setStatus('Streaming OK — device still', true);
          }
        } catch (_) {}
      };
    }

    resetBtn.onclick = () => {
      resetAvatarPose();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send('reset');
      }
    };

    if (!servedFromEsp) {
      ipRow.hidden = false;
      espIpInput.value = localStorage.getItem('espIp') || '';
      setStatus('Open http://ESP_IP/ from serial — or enter IP here', false);
      connectBtn.onclick = () => connect();
    } else {
      connect();
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);

      const now = performance.now();
      if (now - lastFpsTime >= 1000) {
        fpsEl.textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastFpsTime = now;
        if (ws && ws.readyState === WebSocket.OPEN) {
          if (lastMsgTime === 0) {
            const hint = servedFromEsp
              ? 'Connected — no data from ESP (reflash firmware)'
              : 'Connected — no data. Open http://ESP_IP/ in the browser';
            setStatus(hint, false);
          } else if (lastWalking && now - lastWalkingTime < 3000) {
            setStatus('Live IMU data', true);
          } else if (now - lastQuatChange > 2000) {
            setStatus('Streaming OK — device still', true);
          } else if (lastQuatChange > 0) {
            setStatus('Live IMU data', true);
          }
        }
      }
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
